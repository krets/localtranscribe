<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STFU: Secure Transcription Field Utility</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#317EFB">
  <style>
    :root {
      --bg: #ffffff;
      --fg: #222222;
      --primary: #007bff;
      --secondary: #6c757d;
      --border: #dee2e6;
      --bg-alt: #f8f9fa;
      --success: #28a745;
      --danger: #dc3545;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a1a;
        --fg: #f8f9fa;
        --primary: #375a7f;
        --secondary: #aaaaaa;
        --border: #333333;
        --bg-alt: #222222;
        --success: #218838;
        --danger: #c82333;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      max-width: 600px;
      margin: 0 auto;
      padding: 10px;
      line-height: 1.4;
    }

    .card {
      background: var(--bg-alt);
      border: 1px solid var(--border);
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
    }

    #audio-area {
      border: 2px dashed var(--border);
      padding: 20px;
      text-align: center;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 10px;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      font-size: 0.8em;
      color: var(--secondary);
      margin-top: 5px;
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-secondary { background: var(--secondary); color: white; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-sm { padding: 4px 8px; font-size: 0.8em; }

    #progress-container {
      margin-top: 10px;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      display: none;
    }
    #progress-bar {
      height: 100%;
      background: var(--success);
      width: 0%;
      transition: width 0.1s;
    }

    .history-item {
      border-bottom: 1px solid var(--border);
      padding: 12px 0;
    }
    .history-summary {
      display: flex;
      flex-direction: column;
      cursor: pointer;
      gap: 4px;
    }
    .history-text-preview {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 0.95em;
      line-height: 1.3;
    }
    .history-date { 
      color: var(--secondary); 
      font-size: 0.8em;
      text-align: right;
    }
    .history-details { display: none; padding-top: 8px; }
    .history-item.active .history-summary { display: none; }
    .history-item.active .history-details { display: block; }
    .history-full-text {
      background: var(--bg);
      padding: 8px;
      border-radius: 4px;
      margin-bottom: 8px;
      font-size: 0.95em;
      white-space: pre-wrap;
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(0,0,0,.1);
      border-radius: 50%;
      border-top-color: var(--primary);
      animation: spin 1s ease-in-out infinite;
      margin-left: 5px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .tabs { display: flex; gap: 10px; margin-bottom: 10px; border-bottom: 1px solid var(--border); }
    .tab-btn {
      background: none; border: none; color: var(--fg);
      cursor: pointer; padding: 6px 12px; font-size: 0.95em;
      opacity: 0.6;
    }
    .tab-btn.active { opacity: 1; border-bottom: 2px solid var(--primary); font-weight: bold; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .hidden { display: none; }
    .controls { display: flex; gap: 8px; margin-top: 8px; }
    
    #info-banner { font-size: 0.85em; color: var(--secondary); margin-bottom: 15px; text-align: center; }

    .file-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: bold;
      margin-bottom: 10px;
    }
    #flush-btn-x {
      cursor: pointer;
      font-size: 1.2em;
      color: var(--danger);
      padding: 0 5px;
      line-height: 1;
    }
  </style>
</head>
<body>

  <div id="info-banner">
    Secure Transcription Field Utility • Completely Local
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-btn-transcribe">Transcribe</button>
    <button class="tab-btn" id="tab-btn-settings">Settings</button>
  </div>

  <div id="main-interface">
    <div id="transcribe-tab" class="tab-content active">
      <div id="audio-section" class="card">
        <div id="audio-area">Click or Drop Audio File</div>
        <input type="file" id="file-upload" accept="audio/*" class="hidden">
        
        <div id="audio-info" class="hidden">
          <div class="file-row">
            <span id="audio-filename"></span>
            <span id="flush-btn-x" title="Unload file">×</span>
          </div>
          <div class="controls">
            <button id="transcribe-btn" class="btn btn-primary">Transcribe</button>
          </div>
        </div>

        <div id="progress-container">
          <div id="progress-bar"></div>
        </div>
        <div id="status-text" style="font-size: 0.85em; margin-top: 5px;">Ready.</div>
        
        <div class="status-bar">
          <span id="stat-audio-len">--:--</span>
          <span id="stat-transcribe-time">--s</span>
        </div>
      </div>

      <div id="history-section" class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
          <h3 style="margin: 0; font-size: 1rem;">Transcriptions</h3>
          <label style="font-size: 0.8em; color: var(--secondary); display: flex; align-items: center; gap: 5px;">
            <input type="checkbox" id="history-toggle" checked> Store History
          </label>
        </div>
        <div id="history-list"></div>
      </div>
    </div>

    <div id="settings-tab" class="tab-content">
      <div class="card">
        <h3 style="margin-top: 0; font-size: 1rem;">Model Selection</h3>
        <p style="font-size: 0.85em; color: var(--secondary);">Choose the Whisper model to use for transcription.</p>
        <div id="models-list"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
